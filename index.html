<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitácora de Trabajo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #f87523; --yellow: #ffc31b; --teal: #1db7b9; --dark-teal: #126d68;
      --bg: #e7dcc9; --surface: #f2e9d4; --surface2: #ddd0b5;
      --border: #c8b89a; --text: #1e1a14; --muted: #7a6a55; --faint: #a89878;
    }
    body { font-family: 'Trebuchet MS', sans-serif; background: var(--bg); color: var(--text); height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    button { font-family: inherit; }

    /* HEADER */
    .header { padding: 16px 22px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header-label { font-size: 10px; color: var(--faint); letter-spacing: 0.18em; text-transform: uppercase; }
    .header-date { font-size: 13px; color: var(--muted); margin-top: 2px; text-transform: capitalize; }
    .tabs { display: flex; align-items: center; gap: 18px; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 13px; padding: 4px 0; letter-spacing: 0.06em; color: var(--faint); }
    .tab-btn.active { color: var(--dark-teal); font-weight: bold; border-bottom-color: var(--dark-teal); }

    /* MODULO BAR */
    .modulo-bar { padding: 8px 22px; background: var(--surface2); border-bottom: 1px solid var(--border); display: none; align-items: center; justify-content: space-between; }
    .modulo-bar-label { font-size: 11px; color: var(--muted); font-weight: bold; letter-spacing: 0.03em; }
    .modulo-bar-switch { background: none; border: none; color: var(--dark-teal); font-weight: bold; cursor: pointer; font-size: 11px; letter-spacing: 0.03em; padding: 4px 2px; }
    .modulo-bar-switch:hover { text-decoration: underline; }

    /* FLASH */
    .flash { padding: 11px 22px; font-size: 13px; display: none; }
    .flash.ok    { display:block; background:#d4edda; border-bottom:1px solid #b8dfc4; color:#1a5c2a; }
    .flash.warn  { display:block; background:#fff3cd; border-bottom:1px solid #ffeaa0; color:#7a5c00; }
    .flash.error { display:block; background:#f8d7da; border-bottom:1px solid #f1b8bc; color:#8c1a1a; }

    /* IDLE */
    .idle-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:40px; padding:40px 24px; }
    .big-clock { font-size:76px; font-weight:bold; color:var(--text); letter-spacing:-4px; line-height:1; font-variant-numeric:tabular-nums; text-align:center; }
    .big-clock-sec { font-size:14px; color:var(--faint); margin-top:8px; letter-spacing:0.1em; text-align:center; }
    .llegada-btn { width:188px; height:188px; border-radius:50%; background:radial-gradient(circle at 36% 30%, #ffaa55, #f87523 68%); border:none; color:#fff; font-size:20px; font-weight:bold; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; box-shadow:0 6px 32px #f8752355; transition:transform 0.15s, box-shadow 0.2s; }
    .llegada-btn:hover { transform:scale(1.07); box-shadow:0 10px 44px #f8752377; }
    .hint { font-size:11px; color:var(--faint); letter-spacing:0.1em; }

    /* ACTIVE SESSION */
    .session-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .status-bar { padding:14px 22px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .status-label { font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:0.12em; }
    .val-orange { font-size:28px; font-weight:bold; color:var(--orange); font-variant-numeric:tabular-nums; }
    .val-center { font-size:17px; color:var(--text); font-variant-numeric:tabular-nums; }
    .val-teal   { font-size:28px; font-weight:bold; color:var(--dark-teal); }
    .badge-active { font-size:10px; color:var(--teal); text-transform:uppercase; letter-spacing:0.12em; margin-bottom:3px; }
    #activity-log { flex:1; overflow-y:auto; padding:14px 22px; display:flex; flex-direction:column; gap:8px; }
    .act-item { display:flex; gap:12px; align-items:flex-start; padding:10px 14px; background:var(--surface); border-radius:8px; border-left:3px solid var(--teal); box-shadow:0 1px 4px var(--border); }
    .act-time { font-size:11px; color:var(--teal); white-space:nowrap; margin-top:2px; font-weight:bold; font-variant-numeric:tabular-nums; }
    .act-text  { font-size:13px; color:var(--text); line-height:1.55; }
    .act-empty { color:var(--faint); font-size:13px; text-align:center; margin-top:40px; font-style:italic; line-height:1.9; }
    .input-area { padding:12px 22px; border-top:1px solid var(--border); display:flex; gap:10px; background:var(--surface); }
    .act-textarea { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-size:13px; font-family:inherit; resize:none; outline:none; line-height:1.5; }
    .act-textarea::placeholder { color:var(--faint); }
    .add-btn { width:46px; flex-shrink:0; background:var(--yellow); border:none; color:#1a1200; border-radius:8px; font-size:24px; font-weight:bold; cursor:pointer; box-shadow:0 2px 10px #ffc31b66; }
    .salida-area { padding:14px 22px 26px; background:var(--surface); border-top:1px solid var(--border); }
    .salida-btn { width:100%; background:linear-gradient(135deg,#126d68,#0d5a54); border:none; color:#fff; border-radius:12px; padding:15px; font-size:15px; font-weight:bold; letter-spacing:0.14em; cursor:pointer; text-transform:uppercase; box-shadow:0 4px 18px #126d6844; transition:opacity 0.2s; }
    .salida-btn:hover { opacity:0.85; }

    /* INFORMES */
    .informes-wrap { padding:18px 22px; overflow-y:auto; }
    .informes-idle { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:340px; gap:20px; }
    .crear-btn { background:linear-gradient(135deg,#f87523,#d95f10); border:none; color:#fff; border-radius:12px; padding:16px 40px; font-size:15px; font-weight:bold; letter-spacing:0.1em; cursor:pointer; box-shadow:0 4px 20px #f8752344; transition:opacity 0.2s; }
    .crear-btn:hover { opacity:0.85; }
    .rpt-option { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; transition:background 0.15s; text-align:left; box-shadow:0 1px 4px var(--border); width:100%; margin-bottom:12px; }
    .rpt-option:hover { background:var(--surface2); }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 12px; box-shadow:0 1px 4px var(--border); }
    .stat-lbl { font-size:9px; color:var(--faint); text-transform:uppercase; letter-spacing:0.12em; margin-bottom:6px; }
    .entry-card { background:#f2e9d4; border:1px solid #c8b89a; border-left:3px solid #f87523; border-radius:8px; padding:12px 16px; cursor:pointer; box-shadow:0 1px 4px #c8b89a44; transition:background 0.15s; margin-bottom:8px; }
    .entry-card:hover { background:#ddd0b5; }
    .entry-acts { margin-top:10px; padding-top:10px; border-top:1px solid #c8b89a; font-size:12px; color:#5a4a38; line-height:1.75; white-space:pre-wrap; display:none; }
    .export-btn { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:9px; font-size:11px; cursor:pointer; margin-bottom:14px; letter-spacing:0.08em; text-transform:uppercase; }
    .back-btn   { background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer; margin-top:4px; letter-spacing:0.06em; }
    .nuevo-btn  { background:var(--surface); border:1px solid var(--border); color:var(--orange); border-radius:8px; padding:8px 14px; font-size:12px; cursor:pointer; font-weight:bold; }

    /* FORMULARIO (RODEO) */
    .form-wrap { padding:18px 22px; overflow-y:auto; }
    .form-label { font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:0.12em; display:block; margin-bottom:6px; }
    .form-field { width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font-size:15px; font-family:inherit; margin-bottom:16px; outline:none; }
    .form-check-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:14px; }
    .form-check-row input { width:20px; height:20px; flex-shrink:0; accent-color:var(--dark-teal); }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#c8b89a; border-radius:3px; }

    /* FOOTER */
    .app-footer { padding:10px 22px; background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:center; gap:10px; flex-shrink:0; }
    .footer-logo { height:20px; opacity:0.8; }
    .footer-text { font-size:11px; color:var(--faint); letter-spacing:0.04em; }
    .footer-text a { color:var(--dark-teal); text-decoration:none; font-weight:bold; }
    .footer-text a:hover { text-decoration:underline; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-label" id="header-label">Registro de jornada</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="tabs" id="tabs-nav">
      <button class="tab-btn active" id="tab-session" onclick="switchTab('session')">Jornada</button>
      <button class="tab-btn"        id="tab-report"  onclick="switchTab('report')">Informes</button>
    </div>
  </div>

  <!-- MODULO BAR -->
  <div class="modulo-bar" id="modulo-bar">
    <span class="modulo-bar-label" id="modulo-bar-label"></span>
    <button class="modulo-bar-switch" onclick="backToPortada()">⇆ Cambiar módulo</button>
  </div>

  <!-- FLASH -->
  <div class="flash" id="flash"></div>

  <!-- MAIN -->
  <div id="main" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>

  <!-- FOOTER -->
  <footer class="app-footer">
    <img class="footer-logo" src="https://raw.githubusercontent.com/brendario/rio-impulso-digital/refs/heads/main/assets/branding/rio-logo-primary.png" alt="RiO Impulso Digital">
    <span class="footer-text">Desarrollado por <a href="https://brendario.github.io/rio-impulso-digital" target="_blank" rel="noopener">RiO Impulso Digital</a> · Bitácora de Trabajo · Mayo 2026</span>
  </footer>

<script>
  const URL_GS = "https://script.google.com/macros/s/AKfycbyUqWLiXTcw0o5cjRyrlZuR9Y-cmP2IHManoRFLUOgzo27vPGdTm-liw6-Sn3UM36s7/exec";

  // Backend independiente del módulo "Proyecto Recuperación de Rodeo" (ver apps-script-rodeo.gs).
  // TODO: reemplazar por la URL del Web App una vez deployado el Apps Script en la Google Sheet del módulo.
  const URL_GS_RODEO = "PENDIENTE_DEPLOY";

  const RODEO_DUENOS = ['Alfredo', 'Blanca', 'Natalia', 'Gissela', 'Etel', 'Lourdes'];
  const RODEO_CLASIFICACIONES = ['Vaca', 'Vaquilla', 'Toro', 'Novillo', 'Novillito', 'Ternero', 'Ternera', 'Torito'];

  // ── ESTADO ─────────────────────────────────────────────────────────────────
  let S = {
    modulo: localStorage.getItem('bitacora_modulo') || null, // null | 'rescate' | 'rodeo'
    tab: 'session',
    session: JSON.parse(localStorage.getItem('bitacora_session') || 'null'),
    reportPhase: 'idle',   // idle | selecting | picking-date | loaded
    reportType: null,
    reportDate: null,
    calendarMonth: null,
    report: null,
    loading: false,
  };

  // ── UTILIDADES ─────────────────────────────────────────────────────────────
  const pad   = n => String(n).padStart(2,'0');
  const now   = ()  => new Date();
  const fTime = d   => `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const fDate = d   => d.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const fISO  = d   => d.toISOString().split('T')[0];
  const fH    = h   => { const hrs=Math.floor(h),m=Math.round((h-hrs)*60); return m>0?`${hrs}h ${m}m`:`${hrs}h`; };
  const fElap = ms  => { const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000); return h>0?`${h}h ${pad(m)}m ${pad(s)}s`:`${pad(m)}m ${pad(s)}s`; };
  const calcH = (a,b)=> Math.round(((b-a)/3600000)*100)/100;
  const esc   = s   => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function flash(type, msg) {
    const el = document.getElementById('flash');
    el.className = `flash ${type}`;
    el.textContent = msg;
    clearTimeout(flash._t);
    flash._t = setTimeout(()=>{ el.className='flash'; }, 4500);
  }

  // ── TABS ───────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    S.tab = tab;
    document.getElementById('tab-session').className = 'tab-btn' + (tab==='session'?' active':'');
    document.getElementById('tab-report').className  = 'tab-btn' + (tab==='report' ?' active':'');
    render();
  }

  // ── MÓDULOS (PORTADA) ────────────────────────────────────────────────────────
  function selectModulo(m) {
    S.modulo = m;
    localStorage.setItem('bitacora_modulo', m);
    render();
  }

  function backToPortada() {
    S.modulo = null;
    localStorage.removeItem('bitacora_modulo');
    render();
  }

  // ── RENDER PRINCIPAL ───────────────────────────────────────────────────────
  const MODULO_NOMBRES = { rescate: '🐴 Rescate Equino Municipalidad', rodeo: '🤠 Recuperación de Rodeo' };

  function render() {
    const el        = document.getElementById('main');
    const tabsNav   = document.getElementById('tabs-nav');
    const hdrLabel  = document.getElementById('header-label');
    const moduloBar = document.getElementById('modulo-bar');
    const moduloLbl = document.getElementById('modulo-bar-label');

    if (!S.modulo) {
      if (tabsNav)   tabsNav.style.display = 'none';
      if (hdrLabel)  hdrLabel.textContent = 'Bitácora de Rodeo';
      if (moduloBar) moduloBar.style.display = 'none';
      el.innerHTML = tplPortada();
      return;
    }

    if (moduloBar) moduloBar.style.display = 'flex';
    if (moduloLbl) moduloLbl.textContent = MODULO_NOMBRES[S.modulo];

    if (S.modulo === 'rodeo') {
      if (tabsNav)  tabsNav.style.display = 'none';
      if (hdrLabel) hdrLabel.textContent = 'Recuperación de Rodeo';
      el.innerHTML = tplRodeoForm();
      return;
    }

    if (tabsNav)  tabsNav.style.display = 'flex';
    if (hdrLabel) hdrLabel.textContent = 'Registro de jornada';
    el.innerHTML = S.tab === 'session' ? (S.session ? tplActive() : tplIdle()) : tplInformes();
  }

  // ── TEMPLATE: PORTADA (SELECCIÓN DE MÓDULO) ─────────────────────────────────
  function tplPortada() {
    return `
      <div class="idle-screen" style="gap:28px;">
        <div style="text-align:center;">
          <div style="font-size:11px;color:var(--faint);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;">Bitácora de Rodeo</div>
          <div style="font-size:14px;color:var(--muted);">Selecciona con qué proyecto vas a trabajar</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:16px;width:100%;max-width:360px;">
          <button class="rpt-option" style="border-left:4px solid #f87523;padding:22px 20px;" onclick="selectModulo('rescate')">
            <div style="text-align:left;">
              <div style="font-size:15px;font-weight:bold;">🐴 Rescate Equino Municipalidad</div>
              <div style="font-size:11px;color:var(--muted);margin-top:4px;">Registro de jornada y actividades</div>
            </div>
            <span style="font-size:20px;color:#f87523">→</span>
          </button>
          <button class="rpt-option" style="border-left:4px solid #126d68;padding:22px 20px;" onclick="selectModulo('rodeo')">
            <div style="text-align:left;">
              <div style="font-size:15px;font-weight:bold;">🤠 Proyecto Recuperación de Rodeo</div>
              <div style="font-size:11px;color:var(--muted);margin-top:4px;">Próximamente</div>
            </div>
            <span style="font-size:20px;color:#126d68">→</span>
          </button>
        </div>
      </div>`;
  }

  // ── TEMPLATE: MÓDULO RODEO — FORMULARIO DE INTERVENCIÓN ─────────────────────
  function tplRodeoForm() {
    const duenoOpts = RODEO_DUENOS.map(d => `<option value="${d}">${d}</option>`).join('');
    const clasifOpts = RODEO_CLASIFICACIONES.map(c => `<option value="${c}">${c}</option>`).join('');

    return `
      <div class="form-wrap">
        <div style="max-width:420px;margin:0 auto;">
          <div style="font-size:11px;color:var(--faint);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:18px;text-align:center;">Nuevo registro</div>

          <label class="form-label" for="rodeo-caravana">Caravana</label>
          <input type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1"
            id="rodeo-caravana" class="form-field" placeholder="N.º de caravana">

          <label class="form-label" for="rodeo-dueno">Dueño</label>
          <select id="rodeo-dueno" class="form-field">
            <option value="" disabled selected>Seleccione un dueño...</option>
            ${duenoOpts}
          </select>

          <label class="form-label" for="rodeo-clasificacion">Clasificación</label>
          <select id="rodeo-clasificacion" class="form-field">
            <option value="" disabled selected>Seleccione una clasificación...</option>
            ${clasifOpts}
          </select>

          <span class="form-label">Intervenciones</span>
          <label class="form-check-row"><input type="checkbox" id="rodeo-vitamina"> Vitamina</label>
          <label class="form-check-row"><input type="checkbox" id="rodeo-antip-interno"> Antiparasitario Interno</label>
          <label class="form-check-row"><input type="checkbox" id="rodeo-antip-externo"> Antiparasitario Externo</label>

          <label class="form-label" style="margin-top:6px;" for="rodeo-observaciones">Observaciones</label>
          <textarea id="rodeo-observaciones" class="form-field act-textarea" rows="3" placeholder="Observaciones (opcional)"></textarea>

          <button class="salida-btn" onclick="doGuardarRodeo()">Guardar Registro</button>
        </div>
      </div>`;
  }

  // ── ACCIONES: FORMULARIO RODEO ───────────────────────────────────────────────
  async function doGuardarRodeo() {
    const caravana      = document.getElementById('rodeo-caravana').value.trim();
    const dueno         = document.getElementById('rodeo-dueno').value;
    const clasificacion = document.getElementById('rodeo-clasificacion').value;

    if (!caravana)      { flash('error', 'Ingresá el número de caravana'); return; }
    if (!dueno)         { flash('error', 'Seleccioná un dueño'); return; }
    if (!clasificacion) { flash('error', 'Seleccioná una clasificación'); return; }

    if (URL_GS_RODEO === 'PENDIENTE_DEPLOY') {
      flash('error', '⚠️ Backend del módulo aún no deployado — ver apps-script-rodeo.gs');
      return;
    }

    const vitamina      = document.getElementById('rodeo-vitamina').checked;
    const antipInterno  = document.getElementById('rodeo-antip-interno').checked;
    const antipExterno  = document.getElementById('rodeo-antip-externo').checked;
    const observaciones = document.getElementById('rodeo-observaciones').value.trim();

    const params = new URLSearchParams({
      action: 'save',
      caravana,
      dueno,
      clasificacion,
      vitamina: vitamina ? 'Sí' : 'No',
      antiparasitario_interno: antipInterno ? 'Sí' : 'No',
      antiparasitario_externo: antipExterno ? 'Sí' : 'No',
      observaciones,
    });

    try {
      const res  = await fetch(`${URL_GS_RODEO}?${params}`);
      const data = await res.json();
      if (data.success) {
        flash('ok', '✓ Registro guardado correctamente');
        limpiarFormularioRodeo();
      } else {
        flash('error', `Error al guardar: ${data.error || 'respuesta inesperada'}`);
      }
    } catch {
      flash('error', 'Sin conexión — verifica tu internet');
    }
  }

  function limpiarFormularioRodeo() {
    document.getElementById('rodeo-caravana').value = '';
    document.getElementById('rodeo-dueno').value = '';
    document.getElementById('rodeo-clasificacion').value = '';
    document.getElementById('rodeo-vitamina').checked = false;
    document.getElementById('rodeo-antip-interno').checked = false;
    document.getElementById('rodeo-antip-externo').checked = false;
    document.getElementById('rodeo-observaciones').value = '';
    document.getElementById('rodeo-caravana').focus();
  }

  // ── TEMPLATE: IDLE ─────────────────────────────────────────────────────────
  function tplIdle() {
    const n = now();
    return `
      <div class="idle-screen">
        <div>
          <div class="big-clock" id="clock">${fTime(n)}</div>
          <div class="big-clock-sec" id="clock-sec">:${pad(n.getSeconds())}</div>
        </div>
        <button class="llegada-btn" onclick="doLlegada()">LLEGADA</button>
        <div class="hint">Presiona para iniciar la jornada</div>
      </div>`;
  }

  // ── TEMPLATE: SESIÓN ACTIVA ────────────────────────────────────────────────
  function tplActive() {
    return `
      <div class="session-wrap">
        <div class="status-bar">
          <div>
            <div class="status-label">Llegada</div>
            <div class="val-orange">${fTime(new Date(S.session.arrivalTs))}</div>
          </div>
          <div style="text-align:center">
            <div class="badge-active">● activo</div>
            <div class="val-center" id="elapsed">${fElap(Date.now()-S.session.arrivalTs)}</div>
          </div>
          <div style="text-align:right">
            <div class="status-label">Actividades</div>
            <div class="val-teal" id="act-count">${S.session.activities.length}</div>
          </div>
        </div>
        <div id="activity-log">${tplLog()}</div>
        <div class="input-area">
          <textarea id="act-input" class="act-textarea" rows="2"
            placeholder="Describe la actividad... (Enter para agregar)"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doAdd();}"></textarea>
          <button class="add-btn" onclick="doAdd()">+</button>
        </div>
        ${Date.now() - S.session.arrivalTs > 43200000 ? `
        <div style="margin:0 22px 0;padding:14px 16px;background:#fff3cd;border:1px solid #ffeaa0;border-radius:10px;font-size:13px;color:#7a5c00;">
          <div style="font-weight:bold;margin-bottom:8px;">⚠️ La sesión lleva más de 12 horas activa</div>
          <div style="margin-bottom:10px;">¿Olvidaste cerrar el día anterior? Ingresa la hora real de salida:</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="time" id="dep-time-input" value="17:00"
              style="padding:8px 12px;border:1px solid #ffc107;border-radius:8px;background:#fffdf0;font-size:14px;font-family:inherit;outline:none;flex:1;">
            <button onclick="doSalidaConHora()" style="background:#f87523;border:none;color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap;">Cerrar con esta hora</button>
          </div>
        </div>` : ''}
        <div class="salida-area">
          <button class="salida-btn" onclick="doSalida()">SALIDA — cerrar jornada</button>
        </div>
      </div>`;
  }

  function tplLog() {
    if (!S.session || S.session.activities.length === 0)
      return `<div class="act-empty">Aún no hay actividades registradas.<br>Escribe abajo y presiona Enter o +</div>`;
    return S.session.activities.map(a=>`
      <div class="act-item">
        <span class="act-time">${a.time}</span>
        <span class="act-text">${esc(a.text)}</span>
      </div>`).join('');
  }

  function refreshLog() {
    const log = document.getElementById('activity-log');
    if (log) { log.innerHTML = tplLog(); log.scrollTop = log.scrollHeight; }
    const cnt = document.getElementById('act-count');
    if (cnt) cnt.textContent = S.session.activities.length;
  }

  // ── ACCIONES DE SESIÓN ─────────────────────────────────────────────────────
  function doLlegada() {
    S.session = { arrivalTs: Date.now(), activities: [] };
    localStorage.setItem('bitacora_session', JSON.stringify(S.session));
    render();
    setTimeout(()=>document.getElementById('act-input')?.focus(), 100);
  }

  function doAdd() {
    const inp = document.getElementById('act-input');
    if (!inp) return;
    const text = inp.value.trim();
    if (!text) return;
    S.session.activities.push({ time: fTime(now()), text });
    localStorage.setItem('bitacora_session', JSON.stringify(S.session));
    inp.value = '';
    refreshLog();
    inp.focus();
  }

  function doSalidaConHora() {
    const inp = document.getElementById('dep-time-input');
    if (!inp || !inp.value) return;
    const arrival = new Date(S.session.arrivalTs);
    const [h, m]  = inp.value.split(':').map(Number);
    const customEnd = new Date(arrival.getFullYear(), arrival.getMonth(), arrival.getDate(), h, m, 0);
    doSalida(customEnd.getTime());
  }

  async function doSalida(customEndTs) {
    if (!S.session) return;
    const endTs   = customEndTs || Date.now();
    const arrival = new Date(S.session.arrivalTs);
    const elapsed = fElap(endTs - S.session.arrivalTs);
    const actsText = S.session.activities.length > 0
      ? S.session.activities.map(a=>`[${a.time}] ${a.text}`).join('\n')
      : 'Sin actividades registradas';

    const params = new URLSearchParams({
      action:     'save',
      date:       fISO(arrival),
      arrival:    fTime(arrival),
      departure:  fTime(new Date(endTs)),
      activities: actsText,
      duration:   String(calcH(S.session.arrivalTs, endTs)),
    });

    S.session = null;
    localStorage.removeItem('bitacora_session');
    render();

    try {
      const res = await fetch(`${URL_GS}?${params}`);
      const data = await res.json();
      if (data.success) flash('ok', `✓ Jornada guardada — ${elapsed} trabajadas`);
      else flash('error', `Error al guardar: ${data.error || 'respuesta inesperada'}`);
    } catch {
      flash('error', 'Sin conexión — verifica tu internet');
    }
  }

  // ── CALENDARIO DE SEMANAS ─────────────────────────────────────────────────
  function calPrev() {
    const d = S.calendarMonth || now();
    S.calendarMonth = new Date(d.getFullYear(), d.getMonth() - 1, 1);
    render();
  }
  function calNext() {
    const d = S.calendarMonth || now();
    S.calendarMonth = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    render();
  }
  function calSelectMonday(dateStr) {
    S.reportDate = S.reportDate === dateStr ? null : dateStr;
    render();
  }

  function tplWeekCalendar() {
    const ref  = S.calendarMonth || now();
    const year = ref.getFullYear();
    const month = ref.getMonth();
    const today = now();

    const monthName = new Date(year, month, 1)
      .toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });

    const headers = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom']
      .map(h => `<div style="text-align:center;font-size:10px;color:var(--faint);letter-spacing:0.06em;padding:4px 0;">${h}</div>`)
      .join('');

    const firstDow = new Date(year, month, 1).getDay();
    const offset   = firstDow === 0 ? 6 : firstDow - 1;
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    let cells = Array(offset).fill(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);

    const dayCells = cells.map((day, i) => {
      if (!day) return `<div></div>`;
      const col        = i % 7;
      const isMonday   = col === 0;
      const dateStr    = `${year}-${pad(month+1)}-${pad(day)}`;
      const isSelected = S.reportDate === dateStr;
      const isToday    = year === today.getFullYear() && month === today.getMonth() && day === today.getDate();

      if (isMonday) {
        return `<div onclick="calSelectMonday('${dateStr}')"
          style="padding:7px 2px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:bold;
          background:${isSelected ? 'var(--dark-teal)' : 'var(--surface2)'};
          color:${isSelected ? '#fff' : 'var(--dark-teal)'};">${day}</div>`;
      }
      return `<div style="padding:7px 2px;text-align:center;font-size:13px;
        color:${isToday ? 'var(--orange)' : 'var(--faint)'};">${day}</div>`;
    }).join('');

    const canConfirm  = !!S.reportDate;
    const confirmStyle = canConfirm ? '' : 'opacity:0.4;pointer-events:none;';

    return `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <button onclick="calPrev()" style="background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);padding:0 10px;line-height:1;">‹</button>
          <div style="font-size:13px;font-weight:bold;text-transform:capitalize;">${monthName}</div>
          <button onclick="calNext()" style="background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);padding:0 10px;line-height:1;">›</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;">${headers}</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">${dayCells}</div>
      </div>
      <button class="salida-btn" style="margin-top:14px;${confirmStyle}" onclick="doReport('weekly')">
        ${canConfirm ? 'Ver semana del ' + S.reportDate : 'Selecciona un lunes'}
      </button>`;
  }

  // ── TEMPLATE: INFORMES ─────────────────────────────────────────────────────
  function tplInformes() {
    if (S.reportPhase === 'idle') return `
      <div class="informes-wrap">
        <div class="informes-idle">
          <div style="text-align:center">
            <div style="font-size:11px;color:var(--faint);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:6px;">Informes de trabajo</div>
            <div style="font-size:13px;color:var(--muted);">Genera un informe diario, semanal o mensual</div>
          </div>
          <button class="crear-btn" onclick="S.reportPhase='selecting';render()">Crear informe</button>
        </div>
      </div>`;

    if (S.reportPhase === 'picking-date') {
      if (S.reportType === 'weekly') return `
        <div class="informes-wrap">
          <div style="font-size:11px;color:var(--faint);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:16px;text-align:center;">¿Qué semana quieres ver?</div>
          ${tplWeekCalendar()}
          <div style="text-align:center;margin-top:10px;">
            <button class="back-btn" onclick="S.reportPhase='selecting';S.reportDate=null;render()">← Volver</button>
          </div>
        </div>`;

      const labels = { daily:'¿Qué día quieres ver?', monthly:'¿Qué mes quieres ver?' };
      const iType  = S.reportType === 'monthly' ? 'month' : 'date';
      const defVal = S.reportType === 'monthly' ? fISO(now()).slice(0,7) : fISO(now());
      return `
        <div class="informes-wrap">
          <div style="padding-top:30px;max-width:320px;margin:0 auto;">
            <div style="font-size:11px;color:var(--faint);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:20px;text-align:center;">${labels[S.reportType]}</div>
            <input type="${iType}" id="report-date" value="${defVal}"
              style="width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;margin-bottom:14px;outline:none;">
            <button class="salida-btn" style="margin-bottom:10px;" onclick="confirmReportDate()">Ver informe</button>
            <div style="text-align:center;">
              <button class="back-btn" onclick="S.reportPhase='selecting';render()">← Volver</button>
            </div>
          </div>
        </div>`;
    }

    if (S.reportPhase === 'selecting') return `
      <div class="informes-wrap">
        <div style="padding-top:20px;">
          <div style="font-size:11px;color:var(--faint);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:16px;text-align:center;">¿Qué período quieres ver?</div>
          <button class="rpt-option" style="border-left:4px solid #f87523" onclick="S.reportPhase='picking-date';S.reportType='daily';render()">
            <div><div style="font-size:14px;font-weight:bold;">Informe diario</div><div style="font-size:11px;color:var(--muted);margin-top:3px;">Actividades de hoy</div></div>
            <span style="font-size:18px;color:#f87523">→</span>
          </button>
          <button class="rpt-option" style="border-left:4px solid #1db7b9" onclick="S.reportPhase='picking-date';S.reportType='weekly';render()">
            <div><div style="font-size:14px;font-weight:bold;">Informe semanal</div><div style="font-size:11px;color:var(--muted);margin-top:3px;">Resumen de esta semana</div></div>
            <span style="font-size:18px;color:#1db7b9">→</span>
          </button>
          <button class="rpt-option" style="border-left:4px solid #126d68" onclick="S.reportPhase='picking-date';S.reportType='monthly';render()">
            <div><div style="font-size:14px;font-weight:bold;">Informe mensual</div><div style="font-size:11px;color:var(--muted);margin-top:3px;">Resumen del mes en curso</div></div>
            <span style="font-size:18px;color:#126d68">→</span>
          </button>
          <button class="back-btn" onclick="S.reportPhase='idle';render()">← Cancelar</button>
        </div>
      </div>`;

    // loaded
    const titles = { daily:'Diario', weekly:'Semanal', monthly:'Mensual' };
    let body = S.loading
      ? `<div style="color:var(--muted);text-align:center;padding:40px 0;">Generando informe...</div>`
      : S.report ? tplReportData() : '';

    return `
      <div class="informes-wrap">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <div>
            <div style="font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:0.12em;">Informe</div>
            <div style="font-size:16px;font-weight:bold;">${titles[S.reportType]}</div>
            ${S.reportDate ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">${S.reportDate}</div>` : ''}
          </div>
          <button class="nuevo-btn" onclick="S.reportPhase='idle';S.report=null;S.reportDate=null;render()">+ Nuevo informe</button>
        </div>
        ${body}
      </div>`;
  }

  function tplReportData() {
    const r = S.report;
    const entries = r.data.length === 0
      ? `<div style="color:var(--faint);text-align:center;padding:30px;font-size:13px;">Sin registros para este período</div>`
      : [...r.data].reverse().map((item,i)=>`
          <div class="entry-card" onclick="toggleEntry(this)">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <span style="font-size:13px;font-weight:bold;">${item.date}</span>
                <span style="font-size:11px;color:var(--muted);margin-left:10px;">${item.arrival} → ${item.departure}</span>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <span style="font-size:13px;color:var(--dark-teal);font-weight:bold;">${fH(item.duration)}</span>
                <span style="font-size:11px;color:var(--faint);" class="arrow">▼</span>
              </div>
            </div>
            <div class="entry-acts">${esc(item.activities)}</div>
          </div>`).join('');

    return `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-lbl">Jornadas</div><div style="font-size:20px;color:var(--orange);font-weight:bold;">${r.summary.total_entries}</div></div>
        <div class="stat-card"><div class="stat-lbl">Horas totales</div><div style="font-size:20px;color:var(--teal);font-weight:bold;">${fH(r.summary.total_hours)}</div></div>
        <div class="stat-card"><div class="stat-lbl">Promedio/día</div><div style="font-size:20px;color:var(--dark-teal);font-weight:bold;">${fH(r.summary.avg_hours)}</div></div>
      </div>
      ${r.data.length>0 ? `<button class="export-btn" onclick="doExport()">↓ Descargar informe (.txt)</button>` : ''}
      ${entries}`;
  }

  function toggleEntry(card) {
    const acts  = card.querySelector('.entry-acts');
    const arrow = card.querySelector('.arrow');
    const open  = acts.style.display === 'block';
    acts.style.display  = open ? 'none'  : 'block';
    arrow.textContent   = open ? '▼'     : '▲';
  }

  function confirmReportDate() {
    const input = document.getElementById('report-date');
    const defaultVal = S.reportType === 'monthly' ? fISO(now()).slice(0,7) : fISO(now());
    S.reportDate = input ? input.value : defaultVal;
    doReport(S.reportType);
  }

  async function doReport(type) {
    S.reportType  = type;
    S.reportPhase = 'loaded';
    S.loading     = true;
    S.report      = null;
    render();
    try {
      let url = `${URL_GS}?action=report&type=${type}`;
      if (S.reportDate) url += `&date=${S.reportDate}`;
      const res  = await fetch(url);
      const data = await res.json();
      if (data.success) S.report = data;
      else flash('error', 'Error al cargar el informe');
    } catch {
      flash('error', 'No se pudo conectar');
      S.reportPhase = 'idle';
    }
    S.loading = false;
    render();
  }

  function doExport() {
    if (!S.report) return;
    const t = { daily:'DIARIO', weekly:'SEMANAL', monthly:'MENSUAL' }[S.reportType];
    const r = S.report;
    const lines = [
      `INFORME ${t} — BITÁCORA DE TRABAJO`,
      `Generado: ${new Date().toLocaleString('es-MX')}`,
      '─'.repeat(52),
      `Jornadas: ${r.summary.total_entries}   Horas: ${fH(r.summary.total_hours)}   Promedio: ${fH(r.summary.avg_hours)}`,
      '─'.repeat(52), '',
      ...r.data.map(e=>`${e.date}   ${e.arrival} → ${e.departure}   (${fH(e.duration)})\n${e.activities}\n`)
    ];
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));
    a.download = `bitacora_${S.reportType}_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  }

  // ── RELOJ ──────────────────────────────────────────────────────────────────
  setInterval(()=>{
    const n = now();
    const hdr = document.getElementById('header-date');
    if (hdr) hdr.textContent = fDate(n);
    const clk = document.getElementById('clock');
    if (clk) clk.textContent = fTime(n);
    const sec = document.getElementById('clock-sec');
    if (sec) sec.textContent = ':'+pad(n.getSeconds());
    const elp = document.getElementById('elapsed');
    if (elp && S.session) elp.textContent = fElap(n - S.session.arrivalTs);
  }, 1000);

  // ── INICIO ─────────────────────────────────────────────────────────────────
  document.getElementById('header-date').textContent = fDate(now());
  render();
</script>
</body>
</html>
