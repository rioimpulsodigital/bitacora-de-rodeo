<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitácora de Trabajo</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modules/rescate.css">
  <link rel="stylesheet" href="css/modules/rodeo.css">
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-label" id="header-label">Registro de jornada</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="tabs" id="header-nav"></div>
  </div>

  <!-- MODULO BAR -->
  <div class="modulo-bar" id="modulo-bar">
    <span class="modulo-bar-label" id="modulo-bar-label"></span>
    <button class="modulo-bar-switch" onclick="App.backToPortada()">⇆ Cambiar módulo</button>
  </div>

  <!-- FLASH -->
  <div class="flash" id="flash"></div>

  <!-- MAIN -->
  <div id="main" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>

  <!-- FOOTER -->
  <footer class="app-footer">
    <img class="footer-logo" src="https://raw.githubusercontent.com/brendario/rio-impulso-digital/refs/heads/main/assets/branding/rio-logo-primary.png" alt="RiO Impulso Digital">
    <span class="footer-text">Desarrollado por <a href="https://brendario.github.io/rio-impulso-digital" target="_blank" rel="noopener">RiO Impulso Digital</a> · Bitácora de Trabajo · Mayo 2026</span>
  </footer>

  <script type="module" src="js/main.js"></script>

</html>
